# =============================================================================
# Configuración completa de FarmIA Ingestion Engine
# =============================================================================

# ---------------------------------------------------------------------------
# Entorno de ejecución
# Cambia las rutas según donde ejecutes:
#   - Local/tests    → rutas absolutas del sistema de ficheros
#   - Databricks FE  → rutas /Volumes/...
#   - Azure          → rutas abfss://...
# ---------------------------------------------------------------------------
environment:
  landing_path: "/Volumes/workspace/default/landing"
  bronze_path: "/Volumes/workspace/default/bronze"

  # Registro de tablas externas en Unity Catalog (opcional).
  # Si se omiten, el motor escribe a bronze_path pero no registra tabla
  # — útil para tests locales sin metastore.
  bronze_catalog: "workspace"
  bronze_schema: "bronze"

  # Credenciales: se resuelven desde variables de entorno con sintaxis ${VAR}.
  # En Databricks vienen del scope 'farmia' (ver README → "Secret scope").
  # En local exporta las variables o usa un .env.
  kafka_bootstrap_servers: "pkc-ewzgj.europe-west4.gcp.confluent.cloud:9092"
  kafka_security_protocol: "SASL_SSL"
  kafka_sasl_mechanism: "PLAIN"
  kafka_sasl_username: "${KAFKA_SASL_USERNAME}"
  kafka_sasl_password: "${KAFKA_SASL_PASSWORD}"

  schema_registry_url: "https://psrc-1yngo33.europe-west4.gcp.confluent.cloud"
  schema_registry_username: "${SCHEMA_REGISTRY_USERNAME}"
  schema_registry_password: "${SCHEMA_REGISTRY_PASSWORD}"

# ---------------------------------------------------------------------------
# Datasets
# ---------------------------------------------------------------------------
datasets:

  # 1. Ventas online — JSON, batch
  - datasource: ecommerce
    dataset: sales_orders
    source:
      type: batch
      format: json
      use_autoloader: true
      schema_hints: "order_id long, customer_id long, total_amount double, ordered_at timestamp"
      schema_evolution: true
      partition_by:
        - ingestion_date

  # 2. Inventario — CSV, batch
  - datasource: inventory
    dataset: stock
    source:
      type: batch
      format: csv
      use_autoloader: true
      options:
        header: "true"
        delimiter: ","
      schema_hints: "product_id long, quantity int, unit_cost double, updated_at timestamp"
      schema_evolution: true
      partition_by:
        - ingestion_date

  # 3. Proveedores/logística — Parquet, batch
  - datasource: logistics
    dataset: shipments
    source:
      type: batch
      format: parquet
      use_autoloader: true
      schema_evolution: true
      partition_by:
        - ingestion_date

  # 4. Imágenes de campo — binaryFile, batch
  # Autoloader desactivado: binaryFile en cloudFiles tiene soporte limitado
  # de opciones (pathGlobFilter) en Serverless. El file source nativo
  # cubre el caso sin perder funcionalidad.
  - datasource: field_ops
    dataset: crop_images
    source:
      type: batch
      format: binaryFile
      use_autoloader: false
      options:
        pathGlobFilter: "*.jpg"
        recursiveFileLookup: "true"
      schema_evolution: false
      partition_by: []

  # 5. Sensores IoT — Kafka, streaming, JSON
  - datasource: iot
    dataset: sensor_readings
    source:
      type: streaming
      topic_pattern: "sensor_readings"
      key_format: string
      value_format: json
      json_schema: >
        sensor_id string, field_zone string, temperature double,
        humidity double, soil_quality double, battery_level double,
        read_at string
      starting_offsets: earliest
      partition_by:
        - field_zone

  # 6. Eventos de clientes — Kafka, streaming, JSON
  - datasource: mobile
    dataset: customer_events
    source:
      type: streaming
      topic_pattern: "customer_events"
      key_format: string
      value_format: json
      json_schema: >
        event_id string, customer_id long, event_type string,
        platform string, session_id string, page_url string,
        product_id long, duration_ms int, occurred_at string
      starting_offsets: earliest
      partition_by:
        - event_type
